name: Build and Publish FNPACK Package

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build-fnpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      # 1️⃣ 校验 tag 并提取版本号
      - name: Verify tag format and extract version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag does not match vX.Y.Z format: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"


      # 2️⃣ 下载 amd64 backend
      - name: Download and extract ammds backend (amd64)
        shell: bash
        run: |
          mkdir -p /tmp/backend-amd64
          cd /tmp/backend-amd64

          URL="https://github.com/QYG2297248353/AMMDS-Docker/releases/download/${GITHUB_REF_NAME}/ammds-amd64-backend.tar.gz"

          curl -L -o backend.tar.gz "$URL"

          tar -xzf backend.tar.gz

          AMMDS_FILE=$(find . -type f -name "ammds" | head -n 1)

          if [ -z "$AMMDS_FILE" ]; then
            echo "❌ amd64 binary not found"
            exit 1
          fi

          mkdir -p $GITHUB_WORKSPACE/app/bin

          cp "$AMMDS_FILE" \
             $GITHUB_WORKSPACE/app/bin/ammds-amd

          chmod +x $GITHUB_WORKSPACE/app/bin/ammds-amd



      # 3️⃣ 下载 arm64 backend
      - name: Download and extract ammds backend (arm64)
        shell: bash
        run: |
          mkdir -p /tmp/backend-arm64
          cd /tmp/backend-arm64

          URL="https://github.com/QYG2297248353/AMMDS-Docker/releases/download/${GITHUB_REF_NAME}/ammds-arm64-backend.tar.gz"

          curl -L -o backend.tar.gz "$URL"

          tar -xzf backend.tar.gz

          AMMDS_FILE=$(find . -type f -name "ammds" | head -n 1)

          if [ -z "$AMMDS_FILE" ]; then
            echo "❌ arm64 binary not found"
            exit 1
          fi

          mkdir -p $GITHUB_WORKSPACE/app/bin

          cp "$AMMDS_FILE" \
             $GITHUB_WORKSPACE/app/bin/ammds-arm

          chmod +x $GITHUB_WORKSPACE/app/bin/ammds-arm



      # 4️⃣ 下载 fnpack
      - name: Download fnpack
        shell: bash
        run: |
          curl -L \
            -o fnpack-1.2.1-linux-amd64 \
            https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64

          chmod +x fnpack-1.2.1-linux-amd64

          sudo mv fnpack-1.2.1-linux-amd64 /usr/local/bin/fnpack



      # 5️⃣ 准备资源
      - name: Prepare source directory
        shell: bash
        run: |
          SRC_DIR="src-temp"

          mkdir -p "$SRC_DIR"

          rsync -a \
            --exclude='.git' \
            ./ "$SRC_DIR/"

          echo "SRC_DIR=$SRC_DIR" >> "$GITHUB_ENV"



      # 6️⃣ 更新 manifest
      - name: Update manifest version
        shell: bash
        run: |

          MANIFEST="${SRC_DIR}/manifest"

          if [ ! -f "$MANIFEST" ]; then
            echo "❌ manifest not found"
            exit 1
          fi


          sed -i \
            "s/^version[[:space:]]*=.*/version         = ${VERSION}/" \
            "$MANIFEST"



      # 7️⃣ 构建三个 FPK
      - name: Build FPK packages
        shell: bash
        run: |

          NAME="${GITHUB_EVENT_REPOSITORY_NAME}"


          ####################################
          # 1. 双架构版本
          ####################################

          echo "Building multi architecture package..."

          fnpack build -d "$SRC_DIR"


          FILE=$(find . -maxdepth 2 -type f -name "*.fpk" | head -n 1)


          if [ -z "$FILE" ]; then
            echo "❌ multi arch build failed"
            exit 1
          fi


          cp "$FILE" \
            "/tmp/${NAME}.fpk"



          ####################################
          # 2. x86_64版本
          ####################################

          echo "Building x86_64 package..."


          cp -a "$SRC_DIR" "${SRC_DIR}-x86"


          rm -f \
            "${SRC_DIR}-x86/app/bin/ammds-arm"



          fnpack build \
            -d "${SRC_DIR}-x86"



          FILE=$(find . -maxdepth 2 -type f -name "*.fpk" | tail -n 1)



          if [ -z "$FILE" ]; then
            echo "❌ x86_64 build failed"
            exit 1
          fi


          cp "$FILE" \
            "/tmp/${NAME}-x86_64.fpk"



          ####################################
          # 3. arm64版本
          ####################################

          echo "Building arm64 package..."



          cp -a "$SRC_DIR" "${SRC_DIR}-arm"



          rm -f \
            "${SRC_DIR}-arm/app/bin/ammds-amd"



          fnpack build \
            -d "${SRC_DIR}-arm"



          FILE=$(find . -maxdepth 2 -type f -name "*.fpk" | tail -n 1)



          if [ -z "$FILE" ]; then
            echo "❌ arm64 build failed"
            exit 1
          fi


          cp "$FILE" \
            "/tmp/${NAME}-arm64.fpk"



          echo "MULTI_FPK=/tmp/${NAME}.fpk" >> "$GITHUB_ENV"
          echo "X86_FPK=/tmp/${NAME}-x86_64.fpk" >> "$GITHUB_ENV"
          echo "ARM_FPK=/tmp/${NAME}-arm64.fpk" >> "$GITHUB_ENV"



      # 8️⃣ 删除旧资产
      - name: Delete existing release assets
        uses: actions/github-script@v7
        with:
          script: |

            const { owner, repo } = context.repo

            const release_id = context.payload.release.id


            const assets =
              await github.rest.repos.listReleaseAssets({
                owner,
                repo,
                release_id
              })


            for (const asset of assets.data) {

              if (
                asset.name.endsWith(".fpk")
              ) {

                console.log(
                  "Deleting:",
                  asset.name
                )

                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id
                })
              }
            }



      # 9️⃣ 上传三个 FPK
      - name: Upload multi arch FPK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.MULTI_FPK }}
          asset_name: ${{ github.event.repository.name }}.fpk
          asset_content_type: application/octet-stream



      - name: Upload x86_64 FPK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.X86_FPK }}
          asset_name: ${{ github.event.repository.name }}-x86_64.fpk
          asset_content_type: application/octet-stream



      - name: Upload arm64 FPK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ env.ARM_FPK }}
          asset_name: ${{ github.event.repository.name }}-arm64.fpk
          asset_content_type: application/octet-stream
